<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Multi Uploader & Preview</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.0/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  </head>
  <body>
    <header>
      <h1>PDF Multi Uploader & Preview</h1>
    </header>

    <main>
      <section class="controls">
        <label class="modern-upload">
          <input id="fileInput" type="file" accept="application/pdf" multiple />
          <span class="upload-icon">📁</span>
          <span class="upload-text">อัปโหลด PDF หลายไฟล์</span>
        </label>
        <div
          style="
            display: flex;
            flex-direction: column;
            position: relative;
            width: 234px;
          "
        >
          <button id="downloadBtn" disabled>Download</button>
          <span
            style="
              font-size: 12px;
              color: grey;
              position: absolute;
              bottom: -20px;
            "
            >(เมื่อชื่อครบและไม่ซ้ำ)</span
          >
        </div>
        <div id="notif" class="notif hidden"></div>
      </section>

      <section id="grid" class="grid"></section>
    </main>

    <div id="viewer" class="viewer hidden" tabindex="-1">
      <div id="fileCounter" class="file-counter hidden"></div>
      <div class="viewer-content">
        <button id="prevBtn" class="nav">‹</button>
        <div class="viewer-center">
          <canvas id="viewerCanvas"></canvas>
          <iframe
            id="viewerIframe"
            class="viewer-iframe hidden"
            aria-hidden="true"
          ></iframe>
          <div id="viewerLoader" class="viewer-loader hidden">
            <div class="spinner" aria-hidden="true"></div>
            <div class="loader-text">กำลังโหลด PDF ...</div>
          </div>
          <div class="meta">
            <label>ชื่อไฟล์: <input id="nameInput" type="text" /></label>
            <div id="dupMsg" class="dup hidden"></div>
            <div style="display: flex">
              <div class="viewer-actions">
                <label class="add-file-btn">
                  <input
                    id="addFileInput"
                    type="file"
                    accept="application/pdf"
                    multiple
                  />
                  <span class="add-icon">+</span>
                  <span class="add-text">เพิ่มไฟล์</span>
                </label>
              </div>
              <button id="closeInline" class="close-inline">ปิด</button>
            </div>
          </div>
          <div id="pageThumbnailPanel" class="page-thumbnail-panel hidden">
            <div class="thumbnail-header">
              <span>เลือกหน้าที่ต้องการลบ</span>
              <div class="thumbnail-actions">
                <button id="deleteSelectedBtn" class="delete-selected-btn">
                  ลบที่เลือก
                </button>
                <button id="closeThumbnailPanel" class="close-thumbnail-btn">
                  ×
                </button>
              </div>
            </div>
            <div id="thumbnailStrip" class="thumbnail-strip"></div>
          </div>
          <div id="thumbnailBackdrop" class="thumbnail-backdrop hidden"></div>
          <button id="openThumbnailPanelBtn" class="open-thumbnail-btn">
            🗑️ ลบหน้า
          </button>
          <button id="openSortPanelBtn" class="open-sort-btn">
            🔄 จัดเรียงหน้า
          </button>
          <div id="pageSortPanel" class="page-sort-panel hidden">
            <div class="sort-header">
              <span>ลากเพื่อจัดเรียงหน้า</span>
              <div class="sort-actions">
                <button id="saveSortBtn" class="save-sort-btn">
                  บันทึกการจัดเรียง
                </button>
                <button id="closeSortPanelBtn" class="close-sort-btn">×</button>
              </div>
            </div>
            <div id="sortStrip" class="sort-strip"></div>
          </div>
          <div id="sortBackdrop" class="sort-backdrop hidden"></div>
        </div>
        <button id="nextBtn" class="nav">›</button>
      </div>
    </div>

    <!-- Processing overlay shown while generating thumbnails / reading files -->
    <div
      id="processingOverlay"
      class="processing-overlay hidden"
      aria-hidden="true"
    >
      <div class="processing-card">
        <div class="processing-spinner" aria-hidden="true"></div>
        <div class="processing-text" id="processingText">
          กำลังประมวลผลไฟล์...
        </div>
      </div>
    </div>

    <footer class="footer">
      <h4 style="margin: 0px;">version 1.2 <span style="color: red">beta</span></h4>
      <span style="font-size: 12px; color: gray;">unresponsive support</span>
    </footer>
    <script>
      // pdfjs worker
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
    </script>
    <script src="app.js"></script>
  </body>
</html>
