<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Multi Uploader & Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.0/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  </head>
  <body class="bg-[#f5f5f7]">
    <header
      class="sticky top-0 z-50 px-6 py-4 bg-white/80 backdrop-blur-xl border-b border-gray-200/50 shadow-sm"
    >
      <h1 class="text-xl font-semibold text-gray-900 tracking-tight">
        PDF Multi Uploader & Preview
      </h1>
    </header>

    <main class="p-6">
      <section class="flex items-center justify-between gap-4 mb-6">
        <label
          class="inline-flex items-center gap-3 bg-white px-4 py-3 rounded-2xl border border-gray-200/80 shadow-sm cursor-pointer relative overflow-hidden hover:shadow-md hover:border-gray-300 transition-all duration-300 ease-out"
        >
          <input
            id="fileInput"
            type="file"
            accept="application/pdf"
            multiple
            class="absolute inset-0 opacity-0 cursor-pointer"
          />
          <span
            class="text-xl transition-transform duration-300 hover:scale-110"
            >📁</span
          >
          <span class="font-medium text-gray-900">อัปโหลด PDF หลายไฟล์</span>
        </label>
        <div class="flex flex-col relative w-[234px]">
          <button
            id="downloadBtn"
            disabled
            class="text-sm font-medium bg-blue-500 text-white border-none px-4 py-3 rounded-xl cursor-pointer shadow-lg shadow-blue-500/25 transition-all duration-300 ease-out hover:bg-blue-600 hover:shadow-xl hover:shadow-blue-500/30 hover:-translate-y-0.5 active:translate-y-0 disabled:bg-gray-300 disabled:text-gray-500 disabled:shadow-none disabled:cursor-not-allowed disabled:hover:translate-y-0"
          >
            Download
          </button>
          <span
            class="text-xs text-gray-400 absolute -bottom-5 transition-colors duration-300"
            >(เมื่อชื่อครบและไม่ซ้ำ)</span
          >
        </div>
        <div
          id="notif"
          class="hidden px-4 py-3 rounded-xl bg-white border border-gray-200 shadow-sm transition-all duration-300 ease-out"
        ></div>
      </section>

      <section
        id="grid"
        class="grid grid-cols-[repeat(auto-fill,minmax(180px,1fr))] gap-4"
      ></section>
    </main>

    <div
      id="viewer"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] hidden transition-all duration-300 ease-out"
      tabindex="-1"
    >
      <div
        id="fileCounter"
        class="hidden absolute left-1/2 bottom-10 -translate-x-1/2 bg-black/40 backdrop-blur-md text-white px-4 py-2 rounded-full text-sm z-[80] opacity-80 shadow-lg transition-all duration-300"
      >
        ไฟล์ที่ 1/1
      </div>
      <div class="flex items-center gap-4">
        <button
          id="prevBtn"
          class="absolute left-6 top-1/2 -translate-y-1/2 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl px-4 py-3 text-3xl cursor-pointer z-[72] opacity-90 hover:bg-white/20 hover:scale-110 transition-all duration-300 ease-out shadow-lg active:scale-95"
        >
          ‹
        </button>
        <div
          class="bg-black/40 backdrop-blur-xl p-0 rounded-3xl max-w-[100vw] max-h-[100vh] flex items-center justify-center w-[100vw] h-[100vh] relative shadow-2xl"
        >
          <canvas
            id="viewerCanvas"
            class="max-w-full max-h-full w-auto h-auto block mx-auto rounded-lg transition-all duration-300 ease-out"
          ></canvas>
          <iframe
            id="viewerIframe"
            class="absolute inset-0 w-full h-full border-none bg-transparent z-[70] hidden rounded-3xl"
            aria-hidden="true"
          ></iframe>
          <div
            id="viewerLoader"
            class="absolute inset-0 flex flex-col items-center justify-center z-[75] bg-black/40 backdrop-blur-md hidden transition-all duration-300"
          >
            <div
              class="w-14 h-14 rounded-full border-4 border-white/20 border-t-white animate-spin mb-4"
              aria-hidden="true"
            ></div>
            <div class="text-white text-base font-medium">
              กำลังโหลด PDF ...
            </div>
          </div>
          <div
            class="transition-all duration-300 ease-out w-full mt-2 flex flex-col gap-2 absolute left-1/2 -translate-x-1/2 bottom-8 max-w-[42vw] z-[70] bg-white/95 backdrop-blur-xl px-5 py-4 rounded-2xl shadow-2xl border border-white/50 hover:shadow-2xl hover:bg-white/98"
          >
            <label class="text-sm text-gray-700 font-medium"
              >ชื่อไฟล์:
              <input
                id="nameInput"
                type="text"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50/50 focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all duration-300 outline-none"
            /></label>
            <div
              id="dupMsg"
              class="text-red-500 text-sm mt-1.5 hidden font-medium transition-all duration-300"
            ></div>
            <div class="flex gap-3 mt-2">
              <div class="relative">
                <label
                  class="inline-flex items-center gap-2 bg-emerald-500 text-white px-4 py-2.5 rounded-xl cursor-pointer font-medium text-sm transition-all duration-300 hover:bg-emerald-600 hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 shadow-md"
                >
                  <input
                    id="addFileInput"
                    type="file"
                    accept="application/pdf"
                    multiple
                    class="absolute inset-0 opacity-0 cursor-pointer w-0 h-0"
                  />
                  <span class="text-lg font-bold">+</span>
                  <span>เพิ่มไฟล์</span>
                </label>
              </div>
              <button
                id="closeInline"
                class="bg-red-500 text-white border-none px-5 py-2.5 rounded-xl text-sm font-medium cursor-pointer shadow-md transition-all duration-300 hover:bg-red-600 hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 ml-auto"
              >
                ปิด
              </button>
            </div>
          </div>
          <div
            id="pageThumbnailPanel"
            style="width:820px"
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl max-w-[90vw] max-h-[80vh] z-[85] flex flex-col p-6 hidden border border-white/50 transition-all duration-300 ease-out"
          >
            <div
              class="flex justify-between items-center mb-4 pb-3 border-b border-gray-200"
            >
              <span class="font-semibold text-gray-900 text-base"
                >เลือกหน้าที่ต้องการลบ</span
              >
              <div class="flex gap-3 items-center">
                <button
                  id="deleteSelectedBtn"
                  class="bg-red-500 text-white border-none px-4 py-2 rounded-xl cursor-pointer font-medium text-sm transition-all duration-300 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed hover:bg-red-600 hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 shadow-md"
                >
                  ลบที่เลือก
                </button>
                <button
                  id="closeThumbnailPanel"
                  class="bg-transparent border-none text-2xl text-gray-400 cursor-pointer p-0 w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-300 hover:bg-gray-100 hover:text-gray-700 hover:scale-110"
                >
                  ×
                </button>
              </div>
            </div>
            <div
              id="thumbnailStrip"
              class="flex flex-wrap gap-4 overflow-y-auto max-h-[60vh] p-2"
            ></div>
          </div>
          <div
            id="thumbnailBackdrop"
            class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[80] hidden transition-all duration-300"
          ></div>
          <button
            id="openThumbnailPanelBtn"
            class="absolute right-8 bottom-8 bg-red-500 text-white border-none px-5 py-3 rounded-2xl cursor-pointer font-medium text-sm z-[70] shadow-lg shadow-red-500/30 transition-all duration-300 hover:bg-red-600 hover:shadow-xl hover:shadow-red-500/40 hover:-translate-y-0.5 active:translate-y-0"
          >
            🗑️ ลบหน้า
          </button>
          <button
            id="openSortPanelBtn"
            class="absolute right-8 bottom-[88px] bg-violet-500 text-white border-none px-5 py-3 rounded-2xl cursor-pointer font-medium text-sm z-[70] shadow-lg shadow-violet-500/30 transition-all duration-300 hover:bg-violet-600 hover:shadow-xl hover:shadow-violet-500/40 hover:-translate-y-0.5 active:translate-y-0"
          >
            🔄 จัดเรียงหน้า
          </button>
          <div
            id="pageSortPanel"
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl max-w-[90vw] max-h-[80vh] z-[85] flex flex-col p-6 hidden border border-white/50 transition-all duration-300 ease-out"
            style="width:820px"
          >
            <div
              class="flex justify-between items-center mb-4 pb-3 border-b border-gray-200"
            >
              <span class="font-semibold text-gray-900 text-base"
                >ลากเพื่อจัดเรียงหน้า</span
              >
              <div class="flex gap-3 items-center">
                <button
                  id="saveSortBtn"
                  class="bg-violet-500 text-white border-none px-4 py-2 rounded-xl cursor-pointer font-medium text-sm transition-all duration-300 hover:bg-violet-600 hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 shadow-md"
                >
                  บันทึกการจัดเรียง
                </button>
                <button
                  id="closeSortPanelBtn"
                  class="bg-transparent border-none text-2xl text-gray-400 cursor-pointer p-0 w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-300 hover:bg-gray-100 hover:text-gray-700 hover:scale-110"
                >
                  ×
                </button>
              </div>
            </div>
            <div
              id="sortStrip"
              class="flex flex-wrap gap-4 overflow-y-auto max-h-[60vh] p-2"
            ></div>
          </div>
          <div
            id="sortBackdrop"
            class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[80] hidden transition-all duration-300"
          ></div>
        </div>
        <button
          id="nextBtn"
          class="absolute right-6 top-1/2 -translate-y-1/2 bg-white/10 backdrop-blur-md border border-white/20 text-white rounded-2xl px-4 py-3 text-3xl cursor-pointer z-[72] opacity-90 hover:bg-white/20 hover:scale-110 transition-all duration-300 ease-out shadow-lg active:scale-95"
        >
          ›
        </button>
      </div>
    </div>

    <!-- Processing overlay shown while generating thumbnails / reading files -->
    <div
      id="processingOverlay"
      class="fixed inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-[210] hidden transition-all duration-300"
      aria-hidden="true"
    >
      <div
        class="bg-white/95 backdrop-blur-xl px-6 py-5 rounded-2xl shadow-2xl flex items-center gap-4 border border-white/50"
      >
        <div
          class="w-12 h-12 rounded-full border-4 border-blue-500/20 border-t-blue-500 animate-spin"
          aria-hidden="true"
        ></div>
        <div class="font-semibold text-gray-900" id="processingText">
          กำลังประมวลผลไฟล์...
        </div>
      </div>
    </div>

    <footer
      class="flex flex-col gap-0 justify-center fixed bottom-3 left-1/2 -translate-x-1/2 opacity-60 transition-opacity duration-300 hover:opacity-80"
    >
      <h4 class="m-0 text-sm font-medium text-gray-600">
        version 1.2 <span class="text-red-500 font-semibold">beta</span>
      </h4>
      <span class="text-xs text-gray-400">unresponsive support</span>
    </footer>
    <script>
      // pdfjs worker
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
    </script>
    <script src="app.js"></script>
  </body>
</html>
